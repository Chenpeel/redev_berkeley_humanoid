[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[project]
name = "berkeley_humanoid_lite"
version = "0.1.0"
description = "Simulation and task package for Berkeley Humanoid Lite secondary development"
requires-python = ">=3.11,<3.12"
dependencies = [
    "berkeley_humanoid_lite_assets",
    "berkeley_humanoid_lite_lowlevel[runtime]",
    "cc.udp",
    "gymnasium",
    "mujoco",
    "numpy",
    "omegaconf",
    "prettytable",
    "torch==2.7.0",
]

[project.optional-dependencies]
training = [
    "torchvision==0.22.0",
    "isaacsim[all,extscache]==5.1.0",
    "isaacsim-core==5.1.0.0",
    "isaaclab[isaacsim,all]==2.3.2.post1",
    "rsl-rl-lib==3.0.1",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
